<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Local PR Review</title>
  <style>
    :root{--bg:#f4f6f9;--panel:#fff;--panel2:#f8fafc;--text:#182230;--muted:#667085;--border:#e4e7ec;--accent:#6941c6;--accent2:#7f56d9;--red:#d92d20;--orange:#e04f16;--yellow:#b54708;--green:#067647;--shadow:0 8px 28px rgba(16,24,40,.08)}
    html[data-theme=dark]{--bg:#0b0f17;--panel:#121925;--panel2:#182131;--text:#f0f3f8;--muted:#98a2b3;--border:#293244;--accent:#9b8afb;--accent2:#b9a9ff;--red:#ff7068;--orange:#ff9966;--yellow:#fdbf6f;--green:#47cd89;--shadow:0 12px 36px rgba(0,0,0,.3)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.6 Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input{font:inherit}.topbar{position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(14px)}.topbar-inner,.wrap{max-width:1240px;margin:auto;padding-left:28px;padding-right:28px}.topbar-inner{height:62px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:11px;font-weight:750}.logo{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;color:#fff;background:linear-gradient(135deg,var(--accent),#3b82f6);box-shadow:0 6px 18px rgba(105,65,198,.35)}.wrap{padding-top:38px;padding-bottom:64px}.hero{display:grid;grid-template-columns:1fr auto;gap:28px;align-items:start}h1{font-size:32px;letter-spacing:-.03em;margin:0 0 8px}h2{font-size:19px;margin:0}h3{font-size:18px;letter-spacing:-.01em;margin:6px 0 0}h4{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 5px}p{margin:0}.meta{color:var(--muted);display:flex;flex-wrap:wrap;gap:6px 16px}.recommendation{min-width:210px;border:1px solid var(--border);background:var(--panel);border-radius:14px;padding:14px 18px;box-shadow:var(--shadow)}.recommendation span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}.recommendation strong{display:block;margin-top:4px;color:var(--accent2);font-size:15px;text-transform:capitalize}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:28px 0}.stat{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:15px 17px;box-shadow:var(--shadow)}.stat strong{font-size:25px;display:block;line-height:1.2}.stat span{color:var(--muted);font-size:12px}.summary,section{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;margin:18px 0;box-shadow:var(--shadow)}.summary{border-left:4px solid var(--accent)}.summary h2{margin-bottom:8px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.tools{display:flex;flex-wrap:wrap;gap:8px}button{border:1px solid var(--border);background:var(--panel2);color:var(--text);border-radius:9px;padding:7px 11px;cursor:pointer}button:hover{border-color:var(--accent)}button.active{background:var(--accent);border-color:var(--accent);color:#fff}#search{min-width:240px;border:1px solid var(--border);background:var(--panel2);color:var(--text);border-radius:9px;padding:8px 11px;outline:none}#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}.finding{position:relative;border:1px solid var(--border);border-radius:14px;padding:20px;margin:14px 0;background:var(--panel2);overflow:hidden}.finding:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}.severity-critical:before{background:var(--red)}.severity-high:before{background:var(--orange)}.severity-medium:before{background:var(--yellow)}.finding-head{display:flex;justify-content:space-between;gap:16px}.eyebrow{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}.badge{font-weight:800;color:var(--text)}.finding-id{font:12px ui-monospace,SFMono-Regular,monospace;color:var(--muted)}.location{display:flex;align-items:center;gap:8px;margin:13px 0 18px;color:var(--muted)}code{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--accent2)}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.detail-grid>div,.fix{border-top:1px solid var(--border);padding-top:13px}.fix{margin-top:16px}.comment-box{margin-top:18px;border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--panel)}.comment-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border)}.comment-head h4{margin:0}pre{margin:0;padding:15px;white-space:pre-wrap;word-break:break-word;color:var(--text);font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace}.copy{padding:5px 9px;font-size:12px}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:11px}table{width:100%;border-collapse:collapse;min-width:650px}th,td{text-align:left;padding:11px 13px;border-bottom:1px solid var(--border);vertical-align:top}th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--panel2)}tr:last-child td{border-bottom:0}.status{display:inline-flex;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700}.status-passed{color:var(--green);background:color-mix(in srgb,var(--green) 12%,transparent)}.status-failed{color:var(--red);background:color-mix(in srgb,var(--red) 12%,transparent)}.status-not_run,.status-unavailable{color:var(--yellow);background:color-mix(in srgb,var(--yellow) 12%,transparent)}.empty{text-align:center;color:var(--muted);padding:32px}.hidden{display:none!important}ul{margin-bottom:0}@media(max-width:800px){.hero{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:1fr}.section-head{align-items:flex-start;flex-direction:column}#search{width:100%;min-width:0}}@media print{.topbar,.tools,.copy{display:none!important}body{background:#fff;color:#111}.summary,section,.finding,.stat{box-shadow:none;break-inside:avoid}}
  </style>
</head>
<body>
  <script id="review-data" type="application/json">__PR_REVIEW_DATA__</script>
  <nav class="topbar"><div class="topbar-inner"><div class="brand"><span class="logo">PR</span><span>Local Review</span></div><button onclick="toggleTheme()">Theme</button></div></nav>
  <main class="wrap" id="app"></main>
  <script>
    const data=JSON.parse(document.getElementById('review-data').textContent),report=data.report,context=data.context;
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const counts=s=>report.findings.filter(x=>x.severity===s).length,checkCount=s=>report.checks.filter(x=>x.status===s).length;
    const status=s=>`<span class="status status-${esc(s)}">${esc(s).replace('_',' ')}</span>`;
    const cards=report.findings.sort((a,b)=>({critical:0,high:1,medium:2}[a.severity]-({critical:0,high:1,medium:2}[b.severity])||a.file.localeCompare(b.file)||a.line-b.line)).map(f=>`<article class="finding severity-${esc(f.severity)}" data-severity="${esc(f.severity)}" data-search="${esc([f.id,f.title,f.category,f.file,f.evidence,f.impact].join(' ').toLowerCase())}"><div class="finding-head"><div><div class="eyebrow"><span class="badge">${esc(f.severity)}</span><span>${esc(f.category)}</span><span>${esc(f.confidence)} confidence</span></div><h3>${esc(f.title)}</h3></div><span class="finding-id">${esc(f.id)}</span></div><div class="location"><span>&lt;/&gt;</span><code>${esc(f.file)}:${esc(f.line)}</code></div><div class="detail-grid"><div><h4>Changed behavior</h4><p>${esc(f.changedBehavior)}</p></div><div><h4>Trigger</h4><p>${esc(f.trigger)}</p></div><div><h4>Evidence</h4><p>${esc(f.evidence)}</p></div><div><h4>Impact</h4><p>${esc(f.impact)}</p></div></div><div class="fix"><h4>Suggested fix</h4><p>${esc(f.suggestedFix)}</p></div><div class="comment-box"><div class="comment-head"><h4>GitHub review comment</h4><button class="copy" onclick="copyComment(this)">Copy comment</button></div><pre class="review-comment">${esc(f.reviewComment)}</pre></div></article>`).join('');
    const checks=report.checks.map(c=>`<tr><td><strong>${esc(c.name)}</strong></td><td><code>${esc(c.command)}</code></td><td>${status(c.status)}</td><td>${esc(c.result)}</td></tr>`).join('')||'<tr><td colspan="4">No verification commands recorded.</td></tr>';
    const tests=report.missingTests.map(t=>`<tr><td>${esc(t.area)}</td><td>${esc(t.test)}</td><td>${esc(t.reason)}</td></tr>`).join('')||'<tr><td colspan="3">No obvious missing tests for the changed behavior.</td></tr>';
    const limits=report.limitations.length?`<ul>${report.limitations.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:'<p class="meta">No material review limitations recorded.</p>';
    document.title=report.metadata.title;
    document.getElementById('app').innerHTML=`<div class="hero"><div><h1>${esc(report.metadata.title)}</h1><div class="meta"><span>Base <strong>${esc(context.baseRef)}</strong></span><span>Branch <strong>${esc(context.branch)}</strong></span><span>Head <code>${esc(context.head).slice(0,12)}</code></span><span>Generated ${esc(report.metadata.generatedAt)}</span></div></div><div class="recommendation"><span>Merge recommendation</span><strong>${esc(report.recommendation).replaceAll('_',' ')}</strong></div></div><div class="stats"><div class="stat"><strong>${report.findings.length}</strong><span>Total findings</span></div><div class="stat"><strong style="color:var(--red)">${counts('critical')}</strong><span>Critical</span></div><div class="stat"><strong style="color:var(--orange)">${counts('high')}</strong><span>High</span></div><div class="stat"><strong style="color:var(--yellow)">${counts('medium')}</strong><span>Medium</span></div><div class="stat"><strong style="color:var(--green)">${checkCount('passed')}/${report.checks.length}</strong><span>Checks passed</span></div></div><div class="summary"><h2>Executive summary</h2><p>${esc(report.summary)}</p></div><section><div class="section-head"><h2>Findings</h2><div class="tools"><input id="search" type="search" placeholder="Search findings..." oninput="applyFilters()"><button class="active" data-filter="all" onclick="setFilter(this,'all')">All ${report.findings.length}</button><button data-filter="critical" onclick="setFilter(this,'critical')">Critical ${counts('critical')}</button><button data-filter="high" onclick="setFilter(this,'high')">High ${counts('high')}</button><button data-filter="medium" onclick="setFilter(this,'medium')">Medium ${counts('medium')}</button></div></div>${cards}<div id="empty" class="empty hidden">No findings match the current filters.</div></section><section><div class="section-head"><h2>Verification</h2><span class="meta">${checkCount('passed')} passed &middot; ${checkCount('failed')} failed &middot; ${checkCount('not_run')+checkCount('unavailable')} incomplete</span></div><div class="table-wrap"><table><thead><tr><th>Check</th><th>Command</th><th>Status</th><th>Result</th></tr></thead><tbody>${checks}</tbody></table></div></section><section><div class="section-head"><h2>Missing tests</h2><span class="meta">${report.missingTests.length} identified gap(s)</span></div><div class="table-wrap"><table><thead><tr><th>Area</th><th>Test</th><th>Reason</th></tr></thead><tbody>${tests}</tbody></table></div></section><section><h2>Limitations</h2>${limits}</section>`;
    let severity='all';function setFilter(button,value){severity=value;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.toggle('active',x===button));applyFilters()}function applyFilters(){const query=document.getElementById('search').value.toLowerCase().trim();let shown=0;document.querySelectorAll('.finding').forEach(card=>{const visible=(severity==='all'||card.dataset.severity===severity)&&(!query||card.dataset.search.includes(query));card.classList.toggle('hidden',!visible);if(visible)shown++});document.getElementById('empty').classList.toggle('hidden',shown!==0)}async function copyComment(button){const text=button.closest('.comment-box').querySelector('.review-comment').textContent;try{await navigator.clipboard.writeText(text)}catch{const area=document.createElement('textarea');area.value=text;document.body.appendChild(area);area.select();document.execCommand('copy');area.remove()}const old=button.textContent;button.textContent='Copied';setTimeout(()=>button.textContent=old,1400)}function toggleTheme(){const root=document.documentElement;root.dataset.theme=root.dataset.theme==='dark'?'light':'dark';localStorage.setItem('pr-review-theme',root.dataset.theme)}const saved=localStorage.getItem('pr-review-theme');if(saved)document.documentElement.dataset.theme=saved;
  </script>
</body>
</html>
